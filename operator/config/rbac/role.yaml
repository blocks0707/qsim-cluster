---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - pods
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - metrics.k8s.io
  resources:
  - nodes
  - pods
  verbs:
  - get
  - list
- apiGroups:
  - quantum.blocksq.io
  resources:
  - quantumjobs
  - quantumnodeprofiles
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - quantum.blocksq.io
  resources:
  - quantumjobs/finalizers
  - quantumnodeprofiles/finalizers
  verbs:
  - update
- apiGroups:
  - quantum.blocksq.io
  resources:
  - quantumjobs/status
  - quantumnodeprofiles/status
  verbs:
  - get
  - patch
  - update
