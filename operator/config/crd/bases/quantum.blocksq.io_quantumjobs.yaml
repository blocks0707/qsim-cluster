---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.3
  name: quantumjobs.quantum.blocksq.io
spec:
  group: quantum.blocksq.io
  names:
    categories:
    - quantum
    kind: QuantumJob
    listKind: QuantumJobList
    plural: quantumjobs
    singular: quantumjob
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.complexity.qubits
      name: Qubits
      type: integer
    - jsonPath: .spec.complexity.depth
      name: Depth
      type: integer
    - jsonPath: .status.assignedNode
      name: Node
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: QuantumJob is the Schema for the quantumjobs API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: QuantumJobSpec defines the desired state of QuantumJob
            properties:
              circuit:
                description: Circuit specification
                properties:
                  language:
                    default: python
                    description: Programming language used
                    enum:
                    - python
                    - qasm
                    type: string
                  source:
                    description: Source code of the quantum circuit
                    type: string
                  version:
                    default: "3.11"
                    description: Python version for execution
                    type: string
                required:
                - source
                type: object
              complexity:
                description: Circuit complexity metadata (filled by analyzer)
                properties:
                  depth:
                    description: Circuit depth
                    format: int32
                    minimum: 1
                    type: integer
                  estimatedCPUCores:
                    description: Estimated CPU cores needed
                    format: int32
                    minimum: 1
                    type: integer
                  estimatedMemoryMB:
                    description: Estimated memory requirement in MB
                    format: int32
                    minimum: 1
                    type: integer
                  estimatedTimeSec:
                    description: Estimated execution time in seconds
                    format: int32
                    minimum: 1
                    type: integer
                  gateCount:
                    description: Total number of gates
                    format: int32
                    minimum: 1
                    type: integer
                  method:
                    default: automatic
                    description: Simulation method to use
                    enum:
                    - statevector
                    - stabilizer
                    - mps
                    - automatic
                    type: string
                  parallelism:
                    description: Circuit parallelism factor (0.0-1.0)
                    maximum: 1
                    minimum: 0
                    type: number
                  qubits:
                    description: Number of qubits in the circuit
                    format: int32
                    minimum: 1
                    type: integer
                required:
                - depth
                - estimatedCPUCores
                - estimatedMemoryMB
                - estimatedTimeSec
                - gateCount
                - parallelism
                - qubits
                type: object
              resources:
                description: Resource requirements
                properties:
                  cpu:
                    default: "2"
                    description: CPU cores required
                    type: string
                  gpu:
                    default: "0"
                    description: GPU count required
                    type: string
                  memory:
                    default: 4Gi
                    description: Memory required
                    type: string
                type: object
              scheduling:
                description: Scheduling preferences
                properties:
                  nodePool:
                    default: auto
                    description: Preferred node pool
                    enum:
                    - auto
                    - cpu
                    - high-cpu
                    - gpu
                    type: string
                  priority:
                    default: normal
                    description: Job priority level
                    enum:
                    - low
                    - normal
                    - high
                    - critical
                    type: string
                  retryPolicy:
                    description: Retry policy for failed jobs
                    properties:
                      backoffSeconds:
                        default: 30
                        description: Backoff time in seconds before retry
                        format: int32
                        minimum: 1
                        type: integer
                      maxRetries:
                        default: 2
                        description: Maximum number of retries
                        format: int32
                        maximum: 5
                        minimum: 0
                        type: integer
                    type: object
                  timeout:
                    default: 300
                    description: Maximum execution time in seconds
                    format: int32
                    maximum: 3600
                    minimum: 1
                    type: integer
                type: object
              userID:
                description: User ID who submitted the job
                type: string
            required:
            - circuit
            - userID
            type: object
          status:
            description: QuantumJobStatus defines the observed state of QuantumJob
            properties:
              assignedNode:
                description: Node assigned for execution
                type: string
              assignedPool:
                description: Node pool assigned
                enum:
                - auto
                - cpu
                - high-cpu
                - gpu
                type: string
              completionTime:
                description: Time when job execution completed
                format: date-time
                type: string
              conditions:
                description: Conditions represent the latest observations of job state
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              errorMessage:
                description: Error message if job failed
                type: string
              events:
                description: Job lifecycle events
                items:
                  description: JobEvent represents an event in the job lifecycle
                  properties:
                    message:
                      description: Human-readable message
                      type: string
                    reason:
                      description: Reason for the event
                      type: string
                    timestamp:
                      description: Timestamp of the event
                      format: date-time
                      type: string
                    type:
                      description: Event type (Normal, Warning)
                      type: string
                  required:
                  - message
                  - reason
                  - timestamp
                  - type
                  type: object
                type: array
              executionTimeSec:
                description: Actual execution time in seconds
                format: int32
                type: integer
              phase:
                description: Current phase of the job
                enum:
                - Pending
                - Analyzing
                - Scheduling
                - Running
                - Succeeded
                - Failed
                - Cancelled
                type: string
              resultRef:
                description: Reference to the execution result
                properties:
                  bucket:
                    description: S3/MinIO bucket name
                    type: string
                  key:
                    description: Object key/path
                    type: string
                required:
                - bucket
                - key
                type: object
              retryCount:
                description: Number of retry attempts made
                format: int32
                type: integer
              startTime:
                description: Time when job execution started
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
