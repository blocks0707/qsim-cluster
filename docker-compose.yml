version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: qsim-postgres
    environment:
      POSTGRES_DB: qsim
      POSTGRES_USER: qsim
      POSTGRES_PASSWORD: qsim123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qsim -d qsim"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: qsim-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis123
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-server:
    build:
      context: ./api-server
      dockerfile: Dockerfile
    container_name: qsim-api
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=qsim
      - DB_PASSWORD=qsim123
      - DB_NAME=qsim
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis123
      - LOG_LEVEL=debug
      - ANALYZER_URL=http://analyzer:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  analyzer:
    build:
      context: ./analyzer
      dockerfile: Dockerfile
    container_name: qsim-analyzer
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=debug
    restart: unless-stopped

volumes:
  postgres_data: